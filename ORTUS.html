<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steel Haze: Reactive Typography</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-transform: uppercase;
        }

        #start-screen {
            text-align: center;
            z-index: 100;
            cursor: pointer;
        }

        .line {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 5rem;
            opacity: 0;
            pointer-events: none;
            /* The 'shake' variable will be controlled by JS */
            transform: translate(var(--x), var(--y)) scale(var(--s));
            transition: transform 0.05s linear;
        }

        .impact { 
            color: #ff4d00; 
            font-style: italic;
            text-shadow: 0 0 calc(10px + var(--glow)) rgba(255, 77, 0, 0.9);
        }

        @keyframes lyric-fade {
            0% { opacity: 0; filter: blur(15px); }
            10% { opacity: 1; filter: blur(0px); }
            90% { opacity: 1; filter: blur(0px); }
            100% { opacity: 0; filter: blur(15px); }
        }

        .active-line {
            animation: lyric-fade 4s ease-in-out forwards;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="initAudio()">
        <h1 style="letter-spacing: 10px;">INITIALIZE SYSTEM</h1>
        <p style="color: #666;">[ CLICK TO LOAD STEEL-HAZE.MP3 ]</p>
    </div>

    <div id="stage" style="display:none;">
        <div class="line" data-time="31.6">Standing in a cold place</div>
        <div class="line" data-time="37.5">Let me know</div>
        <div class="line" data-time="43.2">My steel core peeling away</div>
        
        <div class="line" data-time="65.9">(All my blood)</div>
        <div class="line impact" data-time="71.6">Let me rise</div>
        <div class="line" data-time="77.5">Rusted pride</div>
        <div class="line impact" data-time="83.1">Let me rise</div>

        <div class="line" data-time="144.4">High and dry</div>
        <div class="line impact" data-time="149.8">I fly high</div>
        </div>

    <audio id="bgm" src="steel-haze.mp3"></audio>

    <script>
        let audioCtx, analyser, dataArray, source;
        const lines = document.querySelectorAll('.line');
        const audio = document.getElementById('bgm');

        function initAudio() {
            // Hide start screen
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('stage').style.display = 'block';

            // Audio Setup
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            audio.play();
            render();
        }

        function render() {
            analyser.getByteFrequencyData(dataArray);
            
            // Get the "Bass" (first few buckets of the frequency data)
            let volume = dataArray[2] / 255; 
            let shake = volume * 15; // How much it vibrates
            let glow = volume * 50;  // How much the glow expands

            // Apply reactive visuals to all active lines
            lines.forEach(line => {
                const startTime = parseFloat(line.getAttribute('data-time'));
                const currentTime = audio.currentTime;

                // Trigger animation if the time matches
                if (currentTime >= startTime && !line.classList.contains('active-line')) {
                    line.classList.add('active-line');
                }

                // Apply the jitter/glow based on audio volume
                if (line.classList.contains('active-line')) {
                    line.style.setProperty('--x', `${(Math.random() - 0.5) * shake}px`);
                    line.style.setProperty('--y', `${(Math.random() - 0.5) * shake}px`);
                    line.style.setProperty('--s', `${1 + (volume * 0.1)}`);
                    line.style.setProperty('--glow', `${glow}px`);
                }
            });

            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
