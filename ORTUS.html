<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steel Haze | LRC Sync Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden; text-transform: uppercase; }
        #ui-log { position: absolute; top: 15px; left: 15px; font-family: monospace; color: #0f0; font-size: 11px; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; border-left: 2px solid #0f0; max-width: 300px; }
        #timer { position: absolute; bottom: 15px; right: 15px; font-family: monospace; color: #444; font-size: 14px; }
        #ignition { padding: 25px 50px; border: 2px solid #ff4d00; color: #ff4d00; background: none; cursor: pointer; font-weight: 900; letter-spacing: 8px; z-index: 101; font-size: 1.2rem; }
        #ignition:hover { background: #ff4d00; color: #000; box-shadow: 0 0 20px #ff4d00; }
        
        #stage { position: relative; width: 100%; height: 100%; display: none; overflow: hidden; }
        .lyric-line { position: absolute; width: 100%; top: 50%; left: 50%; transform: translate(calc(-50% + var(--x, 0px)), calc(-50% + var(--y, 0px))) scale(var(--s, 1)); text-align: center; font-size: clamp(2rem, 8vw, 6rem); font-weight: 900; opacity: 0; pointer-events: none; }
        
        .active { animation: focus-fade 3.5s ease-in-out forwards; }
        @keyframes focus-fade {
            0% { opacity: 0; filter: blur(20px); transform: translate(-50%, -45%) scale(0.8); }
            10% { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1); }
            90% { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; filter: blur(20px); transform: translate(-50%, -55%) scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="ui-log">WAITING FOR INITIALIZATION...</div>
    <div id="timer">00.00</div>
    <button id="ignition" onclick="boot()">[ ENGAGE SYNC ]</button>

    <div id="stage"></div>

    <audio id="track" src="2-13. Steel Haze (Rusted Pride).mp3" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('track');
        const log = document.getElementById('ui-log');
        const timerDisplay = document.getElementById('timer');
        const stage = document.getElementById('stage');
        let aCtx, analyser, data, lyrics = [];

        function updateLog(m) { log.innerHTML += `<br>> ${m}`; console.log(m); }

        async function parseLRC() {
            try {
                // Ensure the filename matches your uploaded file exactly
                const response = await fetch('steel haze.lrc');
                const text = await response.text();
                const lines = text.split('\n');
                const lrcReg = /\[(\d+):(\d+)\.(\d+)\](.*)/;

                lines.forEach(line => {
                    const match = lrcReg.exec(line);
                    if (match) {
                        const mins = parseInt(match[1]);
                        const secs = parseInt(match[2]);
                        const ms = parseInt(match[3]);
                        const time = mins * 60 + secs + ms / 100;
                        const content = match[4].trim();
                        if (content) lyrics.push({ time, content });
                    }
                });
                updateLog(`LRC LOADED: ${lyrics.length} LINES FOUND.`);
            } catch (e) {
                updateLog("LRC ERROR: COULD NOT READ FILE.");
            }
        }

        async function boot() {
            updateLog("SYNCING CORE...");
            await parseLRC();
            
            try {
                if (!aCtx) {
                    aCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = aCtx.createAnalyser();
                    const src = aCtx.createMediaElementSource(audio);
                    src.connect(analyser);
                    analyser.connect(aCtx.destination);
                    analyser.fftSize = 64;
                    data = new Uint8Array(analyser.frequencyBinCount);
                }
                
                if (aCtx.state === 'suspended') await aCtx.resume();
                await audio.play();

                document.getElementById('ignition').style.display = 'none';
                stage.style.display = 'block';
                updateLog("AUDIO FLOWING. ENGINE STABLE.");
                render();
            } catch (e) {
                updateLog("FATAL: " + e.message);
            }
        }

        function render() {
            analyser.getByteFrequencyData(data);
            const bass = data[2] / 255;
            const currentTime = audio.currentTime;
            timerDisplay.innerText = currentTime.toFixed(2);

            // Check if it's time to spawn a new lyric
            lyrics.forEach((lyric, index) => {
                if (currentTime >= lyric.time && !lyric.spawned) {
                    lyric.spawned = true;
                    spawnElement(lyric.content);
                }
            });

            // Reactive jitter for any existing lines
            const activeElements = document.querySelectorAll('.active');
            activeElements.forEach(el => {
                const jitter = bass * 30;
                el.style.setProperty('--x', `${(Math.random() - 0.5) * jitter}px`);
                el.style.setProperty('--y', `${(Math.random() - 0.5) * jitter}px`);
                el.style.setProperty('--s', 1 + (bass * 0.2));
            });

            requestAnimationFrame(render);
        }

        function spawnElement(text) {
            const div = document.createElement('div');
            div.className = 'lyric-line active';
            div.innerText = text;
            // Highlight chorus keywords
            if (text.includes('rise') || text.includes('blood') || text.includes('pride')) {
                div.style.color = '#ff4d00';
                div.style.fontStyle = 'italic';
            }
            stage.appendChild(div);
            
            // Clean up after animation finishes
            setTimeout(() => div.remove(), 4000);
        }

        audio.onerror = () => updateLog("CRITICAL: AUDIO FILE NOT FOUND.");
    </script>
</body>
</html>
