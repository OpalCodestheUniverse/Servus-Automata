<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Haze | Typography Engine</title>
    <style>
        /* RESET & CENTER */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            text-transform: uppercase;
        }

        /* OVERLAYS */
        #ui-layer {
            position: absolute;
            top: 20px; left: 20px;
            font-family: monospace;
            color: #0f0;
            font-size: 12px;
            z-index: 999; /* Always on top */
            text-align: left;
            pointer-events: none;
        }

        #prompt {
            padding: 30px 60px;
            border: 2px solid #ff4d00;
            color: #ff4d00;
            font-weight: 900;
            letter-spacing: 10px;
            cursor: pointer;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
        }

        /* LYRIC STAGING */
        #stage {
            position: absolute;
            width: 100vw;
            height: 100vh;
            display: none; /* Hidden until start */
        }

        .line {
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(var(--s, 1));
            text-align: center;
            font-size: clamp(2rem, 10vw, 6rem); /* Responsive size */
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            line-height: 1.1;
            white-space: nowrap;
        }

        /* ANIMATION STATES */
        .active { animation: glitch-in-out 4s ease-in-out forwards; }
        .impact { color: #ff4d00; font-style: italic; text-shadow: 0 0 40px rgba(255,77,0,0.6); }

        @keyframes glitch-in-out {
            0% { opacity: 0; filter: blur(20px); transform: translate(-50%, -40%) scale(0.8); }
            15% { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; filter: blur(20px); transform: translate(-50%, -60%) scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="ui-layer">SYSTEM IDLE...</div>

    <div id="prompt" onclick="bootSequence()">[ INITIALIZE ]</div>

    <div id="stage">
        <div class="line" data-start="2.0">Standing in a cold place</div>
        <div class="line" data-start="6.0">Let me know</div>
        <div class="line" data-start="10.0">My steel core peeling away</div>
        
        <div class="line impact" data-start="71.6">Let me rise</div>
        <div class="line impact" data-start="83.1">Let me rise</div>
    </div>

    <audio id="vibe-track" src="track.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById('vibe-track');
        const ui = document.getElementById('ui-layer');
        const stage = document.getElementById('stage');
        const prompt = document.getElementById('prompt');
        const lines = document.querySelectorAll('.line');

        let aCtx, anal, dArray;

        function log(msg) {
            ui.innerHTML += `<br>> ${msg}`;
            console.log(msg);
        }

        async function bootSequence() {
            log("BOOTING AUDIO ENGINE...");
            
            try {
                // Audio Context must be started via click
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                anal = aCtx.createAnalyser();
                const source = aCtx.createMediaElementSource(audio);
                source.connect(anal);
                anal.connect(aCtx.destination);
                
                anal.fftSize = 64;
                dArray = new Uint8Array(anal.frequencyBinCount);

                log("LOADING track.mp3...");
                await audio.play();
                
                prompt.style.display = 'none';
                stage.style.display = 'block';
                log("PLAYBACK STARTING.");
                
                requestAnimationFrame(draw);
            } catch (err) {
                log("CRITICAL ERROR: " + err.name);
                log("REASON: " + err.message);
            }
        }

        function draw() {
            anal.getByteFrequencyData(dArray);
            let bass = dArray[2] / 255; 
            let time = audio.currentTime;

            lines.forEach(line => {
                let start = parseFloat(line.getAttribute('data-start'));
                
                // Trigger line
                if (time >= start && !line.classList.contains('active')) {
                    line.classList.add('active');
                    log("SYNC: " + line.innerText);
                }

                // Audio-Reactive Movement
                if (line.classList.contains('active')) {
                    line.style.setProperty('--s', 1 + (bass * 0.1));
                }
            });

            requestAnimationFrame(draw);
        }

        audio.addEventListener('error', () => {
            log("FATAL: track.mp3 NOT FOUND IN REPO.");
        });
    </script>
</body>
</html>
