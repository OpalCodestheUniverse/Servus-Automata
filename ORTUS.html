<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steel Haze | New Timing Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden; text-transform: uppercase; }
        
        #ui-log { position: absolute; top: 15px; left: 15px; font-family: monospace; color: #0f0; font-size: 11px; z-index: 100; background: rgba(0,0,0,0.5); padding: 5px; pointer-events: none; }
        #timer { position: absolute; bottom: 15px; right: 15px; font-family: monospace; color: #444; font-size: 16px; }
        
        #ignition { padding: 25px 50px; border: 2px solid #ff4d00; color: #ff4d00; background: none; cursor: pointer; font-weight: 900; letter-spacing: 8px; z-index: 101; font-size: 1.2rem; }
        #ignition:hover { background: #ff4d00; color: #000; box-shadow: 0 0 30px #ff4d00; }
        
        .lyric-line { position: absolute; width: 100%; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-weight: 900; opacity: 0; pointer-events: none; visibility: hidden; }
        
        .active { visibility: visible; opacity: 1; filter: blur(0px); }
        .exit { opacity: 0; filter: blur(20px); transition: 0.6s ease-in; }

        .primary { font-size: clamp(3rem, 10vw, 7rem); z-index: 10; }
        .ambient { font-size: clamp(2rem, 6vw, 4rem); color: #666; z-index: 5; }
        .chorus { color: #ff4d00 !important; text-shadow: 0 0 var(--glow, 20px) rgba(255, 77, 0, 0.7); }

        .primary.active { animation: main-in 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .ambient.active { animation: ambient-in 0.6s ease-out forwards; }

        @keyframes main-in {
            0% { opacity: 0; filter: blur(20px); transform: translate(-50%, -45%) scale(0.9); }
            100% { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes ambient-in {
            0% { opacity: 0; filter: blur(10px); }
            100% { opacity: 0.4; filter: blur(2px); }
        }
        
        .blinker { animation: blink 1s infinite; color: #0f0; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui-log">CORE STANDBY... <span id="sig-status"></span></div>
    <div id="timer">00.00</div>
    <button id="ignition" onclick="ignite()">[ ENGAGE SYNC ]</button>

    <div id="stage" style="display:none">
        <div class="lyric-line primary" data-t="31.60">Stand in a cold place</div>
        <div class="lyric-line primary" data-t="37.58">Let me know</div>
        <div class="lyric-line primary" data-t="43.28">My steel core</div>
        <div class="lyric-line primary" data-t="48.95">Peels away</div>

        <div class="lyric-line primary chorus" data-t="65.95">All my blood</div>
        <div class="lyric-line primary chorus" data-t="71.69">Let me rise</div>
        <div class="lyric-line primary chorus" data-t="77.54">Rusted pride</div>
        <div class="lyric-line primary chorus" data-t="83.11">Let me rise</div>

        <div class="lyric-line ambient" data-t="123.39">Ooh</div>
        <div class="lyric-line ambient" data-t="128.75">Ooh</div>
        <div class="lyric-line ambient" data-t="134.23">Ooh</div>
        <div class="lyric-line ambient" data-t="139.72">Ooh</div>

        <div class="lyric-line primary chorus" data-t="144.45">High and dry</div>
        <div class="lyric-line primary chorus" data-t="149.88">I fly high</div>
        <div class="lyric-line primary" data-t="155.34">Watch the sun rise</div>
        <div class="lyric-line primary" data-t="161.58">In the dawn</div>
        
        <div class="lyric-line primary" data-t="166.24">Rust away</div>
        <div class="lyric-line primary" data-t="171.64">Lost to the wind</div>
        <div class="lyric-line primary" data-t="177.19">Watch the sun rise</div>
        <div class="lyric-line primary" data-t="183.29">In the dawn</div>

        <div class="lyric-line primary chorus" data-t="188.05">I fly high</div>
        <div class="lyric-line primary chorus" data-t="193.44">I fly high</div>
    </div>

    <audio id="track" src="2-13. Steel Haze (Rusted Pride).mp3" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('track');
        const log = document.getElementById('ui-log');
        const sigStatus = document.getElementById('sig-status');
        const timerDisplay = document.getElementById('timer');
        const lines = Array.from(document.querySelectorAll('.lyric-line'));
        let aCtx, analyser, data;

        async function ignite() {
            try {
                if (!aCtx) {
                    aCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = aCtx.createAnalyser();
                    const src = aCtx.createMediaElementSource(audio);
                    src.connect(analyser);
                    analyser.connect(aCtx.destination);
                    analyser.fftSize = 64;
                    data = new Uint8Array(analyser.frequencyBinCount);
                }
                if (aCtx.state === 'suspended') await aCtx.resume();
                
                await audio.play();
                document.getElementById('ignition').style.display = 'none';
                document.getElementById('stage').style.display = 'block';
                render();
            } catch (e) {
                console.error(e);
            }
        }

        function render() {
            analyser.getByteFrequencyData(data);
            const bass = data[2] / 255;
            const time = audio.currentTime;
            timerDisplay.innerText = time.toFixed(2);

            // Startup Signal Logic
            if (time < 31.60) {
                sigStatus.innerHTML = `<span class="blinker">WAITING FOR VOCAL CONTACT... (${(31.60 - time).toFixed(1)}s)</span>`;
            } else {
                sigStatus.innerHTML = "CONTACT ESTABLISHED.";
            }

            lines.forEach((line, index) => {
                const tStart = parseFloat(line.getAttribute('data-t'));
                const nextLine = lines[index + 1];
                
                // Keep lyric visible for 4s or until the next one starts
                const maxHold = 4.0;
                const tNext = nextLine ? parseFloat(nextLine.getAttribute('data-t')) : tStart + maxHold;
                const tEnd = Math.min(tNext, tStart + maxHold);

                if (time >= tStart && time < tEnd) {
                    if (!line.classList.contains('active')) {
                        line.classList.add('active');
                        line.classList.remove('exit');
                    }
                } else if (line.classList.contains('active')) {
                    line.classList.remove('active');
                    line.classList.add('exit');
                }

                if (line.classList.contains('active')) {
                    const shake = line.classList.contains('primary') ? bass * 50 : bass * 15;
                    line.style.setProperty('--x', `${(Math.random() - 0.5) * shake}px`);
                    line.style.setProperty('--y', `${(Math.random() - 0.5) * shake}px`);
                    line.style.setProperty('--s', 1 + (bass * 0.25));
                    line.style.setProperty('--glow', `${bass * 150}px`);
                    // Apply reactive movement via JS
                    line.style.transform = `translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(var(--s))`;
                }
            });
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
