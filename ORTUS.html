<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steel Haze: Rusted Pride - Interactive Sync</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            text-transform: uppercase;
            cursor: pointer; /* Shows you can click */
        }

        /* The container stays hidden until we "start" the song */
        #video-stage { display: none; width: 100%; height: 100%; position: relative; }

        .line {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            font-size: 5rem;
            font-weight: 900;
            opacity: 0;
            animation: sync-fade 5s ease-in-out forwards;
        }

        .rise { color: #ff4d00; font-style: italic; text-shadow: 0 0 30px rgba(255,77,0,0.7); }

        @keyframes sync-fade {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(10px); }
            10% { opacity: 1; transform: translateY(-50%) scale(1); filter: blur(0px); }
            90% { opacity: 1; transform: translateY(-50%) scale(1); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-70%) scale(1.1); filter: blur(10px); }
        }

        #start-prompt { font-size: 1rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body onclick="startLyrics()">

    <div id="start-prompt">CLICK TO START SYNC (31s INTRO)</div>

    <div id="video-stage">
        <div class="line" style="animation-delay: 31.6s;">Stand in a cold place</div>
        <div class="line" style="animation-delay: 37.5s;">Let me know</div>
        <div class="line" style="animation-delay: 43.2s;">My steel core</div>
        <div class="line" style="animation-delay: 48.9s;">Peels away</div>

        <div class="line" style="animation-delay: 65.9s;">All my blood</div>
        <div class="line rise" style="animation-delay: 71.6s;">Let me rise</div>
        <div class="line" style="animation-delay: 77.5s;">Rusted pride</div>
        <div class="line rise" style="animation-delay: 83.1s;">Let me rise</div>
    </div>

    <script>
        function startLyrics() {
            document.getElementById('start-prompt').style.display = 'none';
            document.getElementById('video-stage').style.display = 'block';
            console.log("Lyrics started. First line in 31 seconds...");
        }
    </script>
</body>
</html>
