<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steel Haze: Rusted Pride - Perfect Sync</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            text-transform: uppercase;
        }

        .line {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 5rem;
            font-weight: 900;
            opacity: 0;
            letter-spacing: -0.05em;
            /* Animation set to 5.5s to cover the gap between most timestamps */
            animation: sync-fade 5.5s ease-in-out forwards;
        }

        /* Chorus/Impact Styling */
        .rise { 
            color: #ff4d00; 
            font-style: italic;
            text-shadow: 0 0 30px rgba(255, 77, 0, 0.7);
            font-size: 6.5rem;
        }

        /* Ethereal/Ooh section */
        .vocal {
            font-weight: 300;
            letter-spacing: 1.5rem;
            color: #888;
            font-size: 3rem;
        }

        @keyframes sync-fade {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); filter: blur(10px); }
            10% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
            85% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
            100% { opacity: 0; transform: scale(1.05) translateY(-10px); filter: blur(10px); }
        }
    </style>
</head>
<body>

    <div class="line" style="animation-delay: 31.6s;">Stand in a cold place</div>
    <div class="line" style="animation-delay: 37.5s;">Let me know</div>
    <div class="line" style="animation-delay: 43.2s;">My steel core</div>
    <div class="line" style="animation-delay: 48.9s;">Peels away</div>

    <div class="line" style="animation-delay: 65.9s;">All my blood</div>
    <div class="line rise" style="animation-delay: 71.6s;">Let me rise</div>
    <div class="line" style="animation-delay: 77.5s; color: #d35400;">Rusted pride</div>
    <div class="line rise" style="animation-delay: 83.1s;">Let me rise</div>

    <div class="line vocal" style="animation-delay: 123.3s;">Ooh</div>
    <div class="line vocal" style="animation-delay: 128.7s;">Ooh</div>
    <div class="line vocal" style="animation-delay: 134.2s;">Ooh</div>
    <div class="line vocal" style="animation-delay: 139.7s;">Ooh</div>

    <div class="line" style="animation-delay: 144.4s;">High and dry</div>
    <div class="line rise" style="animation-delay: 149.8s;">I fly high</div>
    <div class="line" style="animation-delay: 155.3s;">Watch the sun rise</div>
    <div class="line" style="animation-delay: 161.5s; font-size: 3.5rem;">In the dawn</div>

    <div class="line" style="animation-delay: 166.2s;">Rust away</div>
    <div class="line" style="animation-delay: 171.6s;">Lost to the wind</div>
    <div class="line" style="animation-delay: 177.1s;">Watch the sun rise</div>
    <div class="line" style="animation-delay: 183.2s; font-size: 3.5rem;">In the dawn</div>

    <div class="line rise" style="animation-delay: 188.0s;">I fly high</div>
    <div class="line rise" style="animation-delay: 193.4s;">I fly high</div>

</body>
</html>
